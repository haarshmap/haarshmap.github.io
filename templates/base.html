<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>harsha</title>
    <link rel="icon" type="image/png" href="https://github.com/haarshmap.png">
    <link rel="stylesheet" href="https://minima.namishh.com/dist/minima.min.css" />
    <script defer src="https://minima.namishh.com/dist/minima.min.js"></script>
    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

@media (max-width: 480px) {
    button.theme-btn {
        width: auto;
        padding: 2px 6px;
        font-size: 12px;
    }
}

        body {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main {
            width: 100%;
        }

        @media (min-width: 577px) {
            .main {
                width: 75%;
            }
        }

        @media (min-width: 769px) {
            .main {
                width: 50%;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div style="display: flex; align-items: center; justify-content: space-between;">

            <div style="display: flex; align-items: center; gap: 20px;">
                <img src="https://github.com/haarshmap.png" style="width: 36px; height: 36px;" alt="">
                <a href="/" class="button-link">haarshmap</a>
            </div>
            <button class="button-primary theme-btn" onclick="toggleTheme()"> theme </button>
        </div>
        <div class="content">
            {% block content %} {% endblock content %}

            <br>
            <p class="text">
                made with <a href="https://getzola.org" class="button-link">zola</a> and <a class="button-link"
                    href="https://minima.namishh.com">minima</a>
            </p>
        </div>
    </div>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
        }
    </script>
</body>

</html>
